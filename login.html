<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('capactpjj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            margin: 0;
        }

        .voltar-inicio {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: color 0.3s;
            z-index: 10;
        }

        .voltar-inicio:hover {
            color: #D10000;
        }

        .formulario-login {
            /* Fundo sólido, sem transparência */
            background-color: #151515;
            padding: 35px 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #D10000;
            box-shadow: 0 0 25px rgba(209, 0, 0, 0.25);
        }

        .logo-login {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-login img {
            height: 85px;
            width: auto;
            object-fit: contain;
        }

        .formulario-login h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .grupo-campo {
            margin-bottom: 20px;
        }

        .grupo-campo label {
            display: block;
            margin-bottom: 8px;
            color: #B0B0B0;
            font-size: 0.95rem;
        }

        .grupo-campo input {
            /* Fundo sólido nos campos */
            background-color: #0A0A0A;
            border: 1px solid #D10000;
            color: #ffffff;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            transition: border 0.3s ease;
            margin: 0;
        }

        .grupo-campo input:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 2px rgba(209, 0, 0, 0.2);
        }

        .esquecer-senha {
            text-align: right;
            margin-bottom: 25px;
        }

        .esquecer-senha a {
            color: #B0B0B0;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .esquecer-senha a:hover {
            color: #D10000;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #D10000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-login:hover {
            background-color: #FF1A1A;
            transform: translateY(-1px);
        }

        .link-cadastro {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #B0B0B0;
        }

        .link-cadastro a {
            color: #D10000;
            text-decoration: none;
            font-weight: 700;
        }

        .link-cadastro a:hover {
            text-decoration: underline;
        }

        #erroLogin {
            display: none;
            background-color: #e74c3c;
            color: #ffffff;
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Ajuste para telas menores */
        @media (max-width: 400px) {
            .formulario-login {
                padding: 25px 20px;
            }
            .formulario-login h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="voltar-inicio">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>

    <div class="formulario-login">
        <div class="logo-login">
            <img src="logopjj.png" alt="PJJ Pará Jiu-Jitsu">
        </div>
        <h2>FAÇA SEU LOGIN</h2>

        <div id="erroLogin">❌ E-mail ou senha incorretos!</div>

        <form id="formLogin">
            <div class="grupo-campo">
                <label for="emailLogin">E-mail</label>
                <input type="email" id="emailLogin" name="emailLogin" required>
            </div>

            <div class="grupo-campo">
                <label for="senhaLogin">Senha</label>
                <input type="password" id="senhaLogin" name="senhaLogin" required>
            </div>

            <div class="esquecer-senha">
                <a href="#">Esqueceu sua senha?</a>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="link-cadastro">
            Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('emailLogin').value.trim();
            const senha = document.getElementById('senhaLogin').value.trim();

            // ✅ ADMINISTRADOR
            if (email === "admin@pjj.com.br" && senha === "123456") {
                alert("🔐 Acesso Permitido! Entrando no PAINEL ADMINISTRATIVO...");
                window.location.href = "admin.html";
            }
            
            // ✅ ALUNO
            else if (email === "aluno@pjj.com.br" && senha === "123456") {
                alert("✅ Bem-vindo! Entrando na Área do Aluno...");
                window.location.href = "aluno.html";
            }

            // ❌ Dados incorretos
            else {
                document.getElementById('erroLogin').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('erroLogin').style.display = 'none';
                }, 3000);
            }
        });
    </script>

</body>
</html>
