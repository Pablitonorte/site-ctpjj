<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('capactpjj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .voltar-inicio {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--branco);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .voltar-inicio:hover {
            color: var(--vermelho-principal);
        }

        .formulario-login {
            background-color: var(--cinza-escuro);
            padding: 40px 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            border: 2px solid var(--vermelho-principal);
            box-shadow: 0 0 20px rgba(184, 0, 0, 0.2);
        }

        .logo-login {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-login img {
            height: 80px;
            object-fit: contain;
        }

        .formulario-login h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--branco);
            font-size: 2rem;
        }

        .grupo-campo {
            margin-bottom: 18px;
        }

        .grupo-campo label {
            display: block;
            margin-bottom: 6px;
            color: var(--texto-cinza);
            font-size: 0.9rem;
        }

        .grupo-campo input {
            width: 100%;
            padding: 10px 12px;
            background-color: var(--cinza-medio);
            border: 1px solid var(--vermelho-principal);
            color: var(--branco);
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .grupo-campo input:focus {
            outline: none;
            border-color: var(--branco);
        }

        .esquecer-senha {
            text-align: right;
            margin-bottom: 25px;
        }

        .esquecer-senha a {
            color: var(--texto-cinza);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .esquecer-senha a:hover {
            color: var(--vermelho-principal);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: var(--vermelho-principal);
            color: var(--branco);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: var(--vermelho-escuro);
        }

        .link-cadastro {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--texto-cinza);
        }

        .link-cadastro a {
            color: var(--vermelho-principal);
            text-decoration: none;
            font-weight: 700;
        }

        .link-cadastro a:hover {
            text-decoration: underline;
        }

        #erroLogin {
            display: none;
            background-color: #e74c3c;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <a href="index.html" class="voltar-inicio">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>

    <div class="formulario-login">
        <div class="logo-login">
            <img src="logopjj.png" alt="PJJ Pará Jiu-Jitsu">
        </div>
        <h2>FAÇA SEU LOGIN</h2>

        <div id="erroLogin">❌ E-mail ou senha incorretos!</div>

        <form id="formLogin">
            <div class="grupo-campo">
                <label for="emailLogin">E-mail</label>
                <input type="email" id="emailLogin" name="emailLogin" required>
            </div>

            <div class="grupo-campo">
                <label for="senhaLogin">Senha</label>
                <input type="password" id="senhaLogin" name="senhaLogin" required>
            </div>

            <div class="esquecer-senha">
                <a href="#">Esqueceu sua senha?</a>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="link-cadastro">
            Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('emailLogin').value;
            const senha = document.getElementById('senhaLogin').value;

            // ✅ ADMINISTRADOR
            if (email === "admin@pjj.com.br" && senha === "123456") {
                alert("🔐 Acesso Permitido! Entrando no PAINEL ADMINISTRATIVO...");
                window.location.href = "admin.html"; // Vai para área de ADM
            }
            
            // ✅ ALUNO (qualquer outro cadastro ou exemplo)
            else if (email === "aluno@pjj.com.br" && senha === "123456") {
                alert("✅ Bem-vindo! Entrando na Área do Aluno...");
                window.location.href = "aluno.html"; // Vai para área do ALUNO
            }

            // ❌ Dados errados
            else {
                document.getElementById('erroLogin').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('erroLogin').style.display = 'none';
                }, 3000);
            }
        });
    </script>

</body>
</html>
